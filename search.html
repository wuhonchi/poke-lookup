  .holo::after {
    content: ''; position: absolute; inset: 0; pointer-events: none; opacity: 0;
    background: linear-gradient(115deg, transparent 30%, rgba(255,204,0,0.18) 45%, rgba(255,27,107,0.14) 55%, transparent 70%);
    transition: opacity .3s;
  }
  .holo:hover::after { opacity: 1; }
  .scrollbar-thin::-webkit-scrollbar { height: 6px; width: 6px; }
  .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
  .scrollbar-thin::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
  .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: #444; }
  @keyframes fadein { from { opacity: 0; transform: translateY(4px) } to { opacity: 1; transform: none } }
  .fadein { animation: fadein .3s ease-out both; }

// Returns the matched category, or null for free-text search
function matchCategory(query) {
  const q = query.trim().toLowerCase();
  if (!q) return null;
  for (const cat of CATEGORIES) {
    for (const k of cat.keywords) {
      const kl = k.toLowerCase();
      if (kl === q || q === cat.label.toLowerCase()) return cat;
    }
  }
  return null;
}

  "Zoroark": {"ja-hrkt":"ゾロアーク","ja":"ゾロアーク","zh-hant":"索羅亞克","zh-hans":"索罗亚克","ko":"조로아크","fr":"Zoroark","de":"Zoroark","es":"Zoroark","it":"Zoroark"},
  "Zorua": {"ja-hrkt":"ゾロア","ja":"ゾロア","zh-hant":"索羅亞","zh-hans":"索罗亚","ko":"조로아","fr":"Zorua","de":"Zorua","es":"Zorua","it":"Zorua"},
  "Zubat": {"ja-hrkt":"ズバット","ja":"ズバット","zh-hant":"超音蝠","zh-hans":"超音蝠","ko":"주뱃","fr":"Nosferapti","de":"Zubat","es":"Zubat","it":"Zubat"},
  "Zweilous": {"ja-hrkt":"ジヘッド","ja":"ジヘッド","zh-hant":"雙首暴龍","zh-hans":"双首暴龙","ko":"디헤드","fr":"Diamat","de":"Duodino","es":"Zweilous","it":"Zweilous"},
  "Zygarde": {"ja-hrkt":"ジガルデ","ja":"ジガルデ","zh-hant":"基格爾德","zh-hans":"基格尔德","ko":"지가르데","fr":"Zygarde","de":"Zygarde","es":"Zygarde","it":"Zygarde"},
};

function resolveAlias(query) {
  if (!query) return null;
  if (NAME_ALIASES[query]) return NAME_ALIASES[query];
  const lower = query.toLowerCase();
  for (const [k, v] of Object.entries(NAME_ALIASES)) {
    if (k.toLowerCase() === lower) return v;
  }
  return null;
}


function MouseIndex() {
  const [lang, setLang] = useState('all');
  const [searchInput, setSearchInput] = useState('pikachu');
  const [debouncedQuery, setDebouncedQuery] = useState('pikachu');
  const [cards, setCards] = useState([]);
  const [loading, setLoading] = useState(false);
  const [errorMsg, setErrorMsg] = useState('');
  const [modalCard, setModalCard] = useState(null);
  const [progress, setProgress] = useState({ done: 0, total: 0 });
  const [failedKeys, setFailedKeys] = useState(() => new Set());
  const [jpCards, setJpCards] = useState(null);
  const [jpLoadError, setJpLoadError] = useState('');
  const [tcCards, setTcCards] = useState(null);
  const [tcLoadError, setTcLoadError] = useState('');
  const [jpPrices, setJpPrices] = useState(null);
  const reqId = useRef(0);

  // Lazy-load local card indexes from PTCG-database. Loaded once on mount.
  // JP ~3.5 MB, TC ~2.1 MB. Only used when lang matches.
  // Also load Yahoo Auctions JP price snapshot (~few MB) — soft-fail (file may not exist yet during build).
  useEffect(() => {
    let cancelled = false;
    fetch('cards_jp.json')
      .then(r => r.ok ? r.json() : Promise.reject(`HTTP ${r.status}`))
      .then(data => { if (!cancelled) setJpCards(data); })
      .catch(e => { if (!cancelled) setJpLoadError(String(e)); });
    fetch('cards_tc.json')
      .then(r => r.ok ? r.json() : Promise.reject(`HTTP ${r.status}`))
      .then(data => { if (!cancelled) setTcCards(data); })
      .catch(e => { if (!cancelled) setTcLoadError(String(e)); });
    fetch('prices_jp.json')
      .then(r => r.ok ? r.json() : null)
      .then(data => { if (!cancelled && data) setJpPrices(data); })
      .catch(() => {});  // silently ignore — file may not exist during build phase
    return () => { cancelled = true; };
  }, []);

  const markFailed = useCallback((key) => {
    if (!key) return;
    setFailedKeys(prev => {
      if (prev.has(key)) return prev;
      const next = new Set(prev);
      next.add(key);
      return next;
    });
  }, []);

  // Debounce input → only trigger fetch 300ms after user stops typing
  useEffect(() => {
    const t = setTimeout(() => setDebouncedQuery(searchInput), 300);
    return () => clearTimeout(t);
  }, [searchInput]);

  // Interpret query: category match (synonym-aware) or free-text fallback
  const interpretation = useMemo(() => {
    const q = debouncedQuery.trim();
    if (!q) return null;
    const cat = matchCategory(q);
    if (cat) return { type: 'category', cat };
    // Localized name → English equivalent (e.g. 噴火龍 → Charizard)
    const alias = resolveAlias(q);
    return { type: 'free', query: q, alias };
  }, [debouncedQuery]);

  useEffect(() => {
    if (!interpretation) {
      setCards([]);
      setLoading(false);
      setErrorMsg('');
      return;
    }

    const myReq = ++reqId.current;
    setLoading(true);
    setCards([]);
    setErrorMsg('');
    setFailedKeys(new Set());

    // ── JP / TC single-language path: search local PTCG-database index instead of TCGdex ──
    const localSpec = lang === 'ja'
      ? { dataset: jpCards, error: jpLoadError, langKey: 'ja-hrkt', tileLang: 'ja',    keyPrefix: 'jp', label: 'JP' }
      : lang === 'zh-tw'
      ? { dataset: tcCards, error: tcLoadError, langKey: 'zh-hant', tileLang: 'zh-tw', keyPrefix: 'tc', label: 'TC' }
      : null;
    if (localSpec) {
      if (!localSpec.dataset) {
        if (localSpec.error) {
          setErrorMsg(`${localSpec.label} index failed to load: ${localSpec.error}`);
          setLoading(false);
        }
        return;
      }
      // Build native-name search terms:
      //   1. Raw user input (handles partial native input like "リザ" / "噴火")
      //   2. The Pokemon's official native name looked up via alias / category
      const terms = new Set();
      if (interpretation.type === 'category') {
        for (const id of interpretation.cat.dexIds) {
          const en = DEX_TO_NAME[id];
          const native = en && POKEMON_NAMES[en]?.[localSpec.langKey];
          if (native) terms.add(native);
        }
      } else {
        const q = interpretation.query.trim();
        if (q) terms.add(q);
        const en = interpretation.alias || (POKEMON_NAMES[q] ? q : null);
        const native = en && POKEMON_NAMES[en]?.[localSpec.langKey];
        if (native) terms.add(native);
      }
      const termArr = [...terms];
      const matches = localSpec.dataset.filter(c => termArr.some(t => c.name.includes(t)));
      const tiles = matches.map((c, i) => {
        const k = `${localSpec.keyPrefix}-${c.jp_id ?? `${c.set}-${c.number}-${i}`}`;
        return {
          id: k,
          name: c.name,
          image: c.img,
          set: { id: c.set, name: c.set },
          localId: c.number,
          _tileLang: localSpec.tileLang,
          _fullUrl: true,
          _tileKey: k,
        };
      });
      console.log(`[${localSpec.label} local] terms=${JSON.stringify(termArr)} → ${tiles.length} matches`);
      setCards(tiles);
      setLoading(false);
      return;
    }

    (async () => {
      const seen = new Set();
      const all = [];
      const errors = [];

      if (interpretation.type === 'free') {
        // Build the list of search terms — original query + English alias if
        // user typed a localized name like 噴火龍.
        const terms = [interpretation.query];
        if (interpretation.alias && interpretation.alias.toLowerCase() !== interpretation.query.toLowerCase()) {
          terms.push(interpretation.alias);
        }

        if (lang === 'all') {
          const allLangCodes = LANGUAGES.filter(l => l.code !== 'all').map(l => l.code);
          // (lang × term) combinations
          const queries = allLangCodes.flatMap(lng => terms.map(term => ({ lng, term })));
          setProgress({ done: 0, total: queries.length });
          let pdone = 0;

          const fetched = await Promise.all(queries.map(async ({ lng, term }) => {
            const url = `https://api.tcgdex.net/v2/${lng}/cards?name=${encodeURIComponent(term)}`;
            try {
              const res = await fetch(url);
              if (!res.ok) throw new Error(`HTTP ${res.status}`);
              const data = await res.json();
              return { lng, term, cards: Array.isArray(data) ? data : [] };
            } catch (e) {
              errors.push(`${lng}/${term}: ${e?.message || e}`);
              return { lng, term, cards: [] };
            } finally {
              pdone++;
              if (myReq === reqId.current) setProgress({ done: pdone, total: queries.length });
            }
          }));

          if (myReq !== reqId.current) return;

          // base card per ID (prefer EN data when available)
          const baseById = new Map();
          for (const { lng, cards } of fetched) {
            for (const c of cards) {
              if (!c?.id) continue;
              if (!baseById.has(c.id) || lng === 'en') baseById.set(c.id, c);
            }
          }
          // direct API match per (id, lang)
          const directMatches = new Map();
          for (const { lng, cards } of fetched) {
            for (const c of cards) {
              if (c?.id) directMatches.set(`${c.id}__${lng}`, c);
            }
          }

          // Synthesize tiles: one per (id × lang) combination
          const tiles = [];
          for (const [id, base] of baseById) {
            for (const lng of allLangCodes) {
              const direct = directMatches.get(`${id}__${lng}`);
              if (direct) {
                tiles.push({
                  ...direct,
                  _tileKey: `${id}__${lng}`,
                  _tileLang: lng,
                  _synthesized: false,
                });
              } else if (base.image) {
                tiles.push({
                  ...base,
                  _tileKey: `${id}__${lng}`,
                  _tileLang: lng,
                  _synthesized: true,
                  image: swapLang(base.image, lng),
                });
              }
            }
          }
          console.log(`[ALL "${interpretation.query}"] ${baseById.size} unique cards → ${tiles.length} tile candidates across ${allLangCodes.length} languages`);
          setCards(tiles);
        } else {
          // Specific language mode: query EN + that language, with both
          // original and alias terms.
          const langsToQuery = lang === 'en' ? ['en'] : ['en', lang];
          const queries = langsToQuery.flatMap(lng => terms.map(term => ({ lng, term })));
          setProgress({ done: 0, total: queries.length });
          let pdone = 0;

          const results = await Promise.all(queries.map(async ({ lng, term }) => {
            const url = `https://api.tcgdex.net/v2/${lng}/cards?name=${encodeURIComponent(term)}`;
            try {
              const res = await fetch(url);
              if (!res.ok) throw new Error(`HTTP ${res.status}`);
              const data = await res.json();
              return { lng, term, data: Array.isArray(data) ? data : [] };
            } catch (e) {
              errors.push(`${lng}/${term}: ${e?.message || e}`);
              return { lng, term, data: [] };
            } finally {
              pdone++;
              if (myReq === reqId.current) setProgress({ done: pdone, total: queries.length });
            }
          }));

          if (myReq !== reqId.current) return;

          // Merge: EN results first (image-swapped), then localized overwrites
          const byId = new Map();
          for (const { lng, data } of results.filter(r => r.lng === 'en')) {
            for (const c of data) {
              if (!c?.id) continue;
              const image = c.image && lang !== 'en' ? swapLang(c.image, lang) : c.image;
              if (!byId.has(c.id)) byId.set(c.id, { ...c, image, _tileLang: lang });
            }
          }
          for (const { lng, data } of results.filter(r => r.lng !== 'en')) {
            for (const c of data) {
              if (!c?.id) continue;
              byId.set(c.id, { ...c, _tileLang: lang });
            }
          }

          const merged = Array.from(byId.values());
          console.log(`[free "${interpretation.query}"${interpretation.alias ? ` + "${interpretation.alias}"` : ''}] +${merged.length} cards (display: ${lang})`);
          setCards(merged);
        }
      } else {
        // Category: fan out one EN request per dex ID, dedupe results.
        // We always query the EN endpoint because Pokémon names like "Pikachu"
        // are universal English; localized endpoints (e.g. JA) wouldn't match.
        // For display, we swap image URLs to the user's selected language.
        const cat = interpretation.cat;
        setProgress({ done: 0, total: cat.dexIds.length });
        let done = 0;

        const tasks = cat.dexIds.map(async (id) => {
          const name = DEX_TO_NAME[id];
          if (!name) {
            done++;
            setProgress({ done, total: cat.dexIds.length });
            return;
          }
          const url = `https://api.tcgdex.net/v2/en/cards?name=${encodeURIComponent(name)}`;
          try {
            const res = await fetch(url);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            if (myReq !== reqId.current) return;
            const arr = Array.isArray(data) ? data : [];
            console.log(`[${name} #${id}] +${arr.length} cards`);
            for (const c of arr) {
              if (!c?.id) continue;
              if (lang === 'all') {
                // Generate one variant tile per language (broken images get hidden)
                const allLangCodes = LANGUAGES.filter(l => l.code !== 'all').map(l => l.code);
                for (const lng of allLangCodes) {
                  const tileKey = `${c.id}__${lng}`;
                  if (seen.has(tileKey)) continue;
                  seen.add(tileKey);
                  all.push({
                    ...c,
                    _tileKey: tileKey,
                    _tileLang: lng,
                    _synthesized: lng !== 'en',
                    _dexId: id,
                    image: lng === 'en' ? c.image : (c.image ? swapLang(c.image, lng) : null),
                  });
                }
              } else if (!seen.has(c.id)) {
                seen.add(c.id);
                const image = c.image && lang !== 'en' ? swapLang(c.image, lang) : c.image;
                all.push({ ...c, image, _tileLang: lang, _dexId: id });
              }
            }
            setCards([...all]);
          } catch (e) {
            console.warn(`[${name}] failed:`, e);
            errors.push(`${name}: ${e?.message || e}`);
          } finally {
            done++;
            if (myReq === reqId.current) {
              setProgress({ done, total: cat.dexIds.length });
            }
          }
        });
        await Promise.allSettled(tasks);
      }

      if (myReq === reqId.current) {
        if (errors.length) setErrorMsg(errors.slice(0, 5).join(' · ') + (errors.length > 5 ? ` +${errors.length - 5} more` : ''));
        setLoading(false);
      }
    })();
  }, [lang, interpretation, jpCards, tcCards]);

  // Sort newest-first using whichever signal is available for the card's source.
  // - JP (PTCG-DB): set release date (JP_SET_INFO) primary, jp_id fallback
  // - TC (PTCG-DB): set release date (TC_SET_INFO) primary, image URL ID fallback
  // - EN (TCGdex):  EN_SET_DATES[setId] release date — setId derived from card.id when set object is missing
  const cardsWithImage = useMemo(() => {
    const filtered = cards.filter(c => c.image);
    const tsOf = (date) => date ? Date.parse(date) / 1000 : 0;
    const keyOf = (c) => {
      // Resolve set code: prefer card.set.id, fall back to prefix of card.id (e.g. "swsh3-25" -> "swsh3")
      const setId = c.set?.id || (typeof c.id === 'string' && c.id.includes('-') ? c.id.split('-')[0] : null);
      if (c._tileLang === 'ja') {
        const ts = tsOf(JP_SET_INFO[setId]?.date);
        if (ts) return ts;
        // Fallback: jp_id from id like "jp-46659"
        if (typeof c.id === 'string' && c.id.startsWith('jp-')) return Number(c.id.slice(3)) || 0;
        return 0;
      }
      if (c._tileLang === 'zh-tw') {
        const ts = tsOf(TC_SET_INFO[setId]?.date);
        if (ts) return ts;
        const m = (c.image || '').match(/tw0*(\d+)/);
        return m ? Number(m[1]) : 0;
      }
      // EN / TCGdex
      return tsOf(EN_SET_DATES[setId]);
    };
    return [...filtered].sort((a, b) => keyOf(b) - keyOf(a));
  }, [cards]);
  const missingImages = cards.length - cardsWithImage.length;
  const visibleCount = useMemo(
    () => cardsWithImage.reduce((n, c) => n + (failedKeys.has(c._tileKey || c.id) ? 0 : 1), 0),
    [cardsWithImage, failedKeys]
  );
  const langName = LANGUAGES.find(l => l.code === lang)?.name || lang;

  return (
    <div className="min-h-screen bg-[#0a0a0a] text-zinc-100">
      {/* HEADER */}
      <header className="sticky top-0 z-30 border-b border-zinc-900 bg-[#0a0a0a]/85 backdrop-blur-md">
        <div className="max-w-[1400px] mx-auto px-4 md:px-6 py-4 md:py-5">
          <div className="flex items-end justify-between gap-4 flex-wrap">
            <div>
              <h1 className="display text-3xl md:text-5xl text-[#FFCC00]">
                POKÉ<span className="text-white mx-0.5">/</span>FIND
              </h1>
              <p className="mono text-[10px] md:text-xs text-zinc-500 uppercase mt-1.5" style={{letterSpacing: '0.2em'}}>
                Pokémon TCG card search · 10 languages · powered by tcgdex.net
              </p>
            </div>
            <div className="flex items-center gap-3">
              <a href="/"
                 className="mono text-[10px] uppercase tracking-wider px-2.5 py-1 rounded-sm border border-zinc-800 text-zinc-400 hover:border-[#FFCC00] hover:text-[#FFCC00] transition">
                / Center
              </a>
              <a href="https://tcgdex.dev" target="_blank" rel="noopener noreferrer"
                 className="mono text-[10px] text-zinc-500 hover:text-[#FFCC00] flex items-center gap-1 transition">
                tcgdex.dev <IExt className="w-3 h-3" />
              </a>
            </div>
          </div>

          <div className="mt-4 flex items-center gap-1.5 flex-wrap">
            <span className="mono text-[10px] text-zinc-500 uppercase mr-1" style={{letterSpacing:'0.15em'}}>Lang →</span>
            {LANGUAGES.map(l => (
              <button key={l.code} onClick={() => setLang(l.code)} title={l.name}
                className={`mono text-[11px] px-2.5 py-1 rounded-sm border transition ${
                  lang === l.code
                    ? 'border-[#FFCC00] bg-[#FFCC00] text-black font-bold'
                    : 'border-zinc-800 text-zinc-500 hover:border-zinc-600 hover:text-zinc-200'
                }`}>
                {l.label}
              </button>
            ))}
          </div>
        </div>
      </header>

      {/* SEARCH */}
      <div className="border-b border-zinc-900 grain">
        <div className="max-w-[1400px] mx-auto px-4 md:px-6 py-4">
          <div className="relative">
            <ISearch className="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-zinc-600 pointer-events-none" />
            <input
              type="text"
              value={searchInput}
              onChange={(e) => setSearchInput(e.target.value)}
              placeholder="Try: Charizard, リザードン, 噴火龍, mouse, eevee, dragon…"
              className="w-full bg-zinc-950 border border-zinc-800 focus:border-[#FFCC00] outline-none rounded-md pl-10 pr-10 py-3 text-sm text-zinc-100 placeholder-zinc-600 transition mono"
              autoFocus
            />
            {searchInput && (
              <button
                onClick={() => setSearchInput('')}
                className="absolute right-3 top-1/2 -translate-y-1/2 text-zinc-600 hover:text-zinc-100 transition"
                aria-label="Clear search"
              >
                <IX className="w-4 h-4" />
              </button>
            )}
          </div>

          {/* QUICK CATEGORY CHIPS */}
          <div className="mt-3 flex items-center gap-1.5 overflow-x-auto scrollbar-thin pb-1 -mx-1 px-1">
            <span className="mono text-[10px] text-zinc-500 uppercase mr-1 shrink-0" style={{letterSpacing:'0.15em'}}>Common →</span>
            {CATEGORIES.map(cat => {
              const active = matchCategory(debouncedQuery)?.label === cat.label;
              return (
                <button
                  key={cat.label}
                  onClick={() => setSearchInput(cat.keywords[0])}
                  className={`shrink-0 mono text-[11px] px-3 py-1.5 rounded-full border transition whitespace-nowrap flex items-center gap-1.5 ${
                    active
                      ? 'bg-[#FF1B6B] border-[#FF1B6B] text-white font-bold'
                      : 'border-zinc-800 text-zinc-400 hover:border-zinc-600 hover:text-zinc-100'
                  }`}
                >
                  <span>{cat.emoji}</span>
                  <span>{cat.label}</span>
                </button>
              );
            })}
          </div>
        </div>
      </div>

      {/* STATUS */}
      <div className="max-w-[1400px] mx-auto px-4 md:px-6 py-3">
        <div className="mono text-[11px] text-zinc-500">
          {loading ? (
            <span className="flex items-center gap-2">
              <ILoader className="w-3 h-3 animate-spin text-[#FFCC00]" />
              {(lang === 'ja' && !jpCards)
                ? (jpLoadError ? `JP index load failed: ${jpLoadError}` : 'loading JP index (~3.5 MB)…')
                : (lang === 'zh-tw' && !tcCards)
                ? (tcLoadError ? `TC index load failed: ${tcLoadError}` : 'loading TC index (~2.1 MB)…')
                : `fetching ${progress.done}/${progress.total} · `}
              {(!((lang === 'ja' && !jpCards) || (lang === 'zh-tw' && !tcCards))) && (<><span className="text-[#FFCC00] font-bold">{visibleCount}</span> visible / {cardsWithImage.length} candidates</>)}
            </span>
          ) : (
            <span>
              <span className="text-[#FFCC00] font-bold">{visibleCount}</span> visible
              {cardsWithImage.length !== visibleCount && (
                <span className="text-zinc-700"> / {cardsWithImage.length} candidate{cardsWithImage.length === 1 ? '' : 's'}</span>
              )}
              {missingImages > 0 && <span className="text-zinc-700"> · {missingImages} no image</span>}
              <span className="text-zinc-700"> · {langName}</span>
              {lang === 'all' && (
                <span className="text-zinc-700"> · all language variants shown; missing ones auto-hide</span>
              )}
              {lang !== 'all' && lang !== 'en' && (
                <span className="text-zinc-700"> · cards without {langName} version are hidden</span>
              )}
            </span>
          )}
        </div>
      </div>

      {errorMsg && (
        <div className="max-w-[1400px] mx-auto px-4 md:px-6 mb-2">
          <div className="mono text-[11px] text-rose-300 bg-rose-950/40 border border-rose-900 rounded-md px-3 py-2 flex items-start gap-2">
            <IAlert className="w-3.5 h-3.5 shrink-0 mt-0.5" />
            <div className="break-all">
              <div className="font-bold mb-0.5">Fetch failed</div>
              <div className="text-rose-400/80">{errorMsg}</div>
            </div>
          </div>
        </div>
      )}

      {/* GRID */}
      <main className="max-w-[1400px] mx-auto px-4 md:px-6 pb-20">
        {cardsWithImage.length === 0 && !loading ? (
          <div className="text-center py-24 mono text-zinc-600 fadein">
            <IOff className="w-10 h-10 mx-auto mb-3 opacity-30" />
            {!debouncedQuery.trim() ? (
              <>
                <p className="text-sm">Type something to start searching.</p>
                <p className="text-xs mt-1 text-zinc-700">Try a category, a Pokémon name, or any keyword.</p>
              </>
            ) : (
              <>
                <p className="text-sm">No cards found for "<span className="text-zinc-400">{debouncedQuery}</span>" in <span className="text-zinc-400">{langName}</span>.</p>
                <p className="text-xs mt-1 text-zinc-700">Try a different word or another language.</p>
              </>
            )}
          </div>
        ) : (
          <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3 md:gap-4">
            {cardsWithImage.map(card => (
              <CardTile
                key={card._tileKey || card.id}
                card={card}
                hideOnError={lang !== 'all' || card._synthesized}
                onError={() => markFailed(card._tileKey || card.id)}
                onClick={() => setModalCard(card)}
                priceData={card._tileLang === 'ja' && jpPrices ? jpPrices[`${card.set?.id}-${card.localId}`] : null}
              />
            ))}
          </div>
        )}
      </main>

      {modalCard && (
        <CardModal card={modalCard} currentLang={lang} onClose={() => setModalCard(null)} />
      )}

      <footer className="border-t border-zinc-900">
        <div className="max-w-[1400px] mx-auto px-4 md:px-6 py-5 mono text-[10px] text-zinc-600 flex flex-wrap gap-3 items-center justify-between">
          <span>Data & images: <a href="https://tcgdex.dev" target="_blank" rel="noopener noreferrer" className="text-zinc-500 hover:text-[#FFCC00] underline underline-offset-2">tcgdex.net</a></span>
          <span className="text-zinc-700">Pokémon ™ Nintendo · Creatures · GAME FREAK</span>
        </div>
      </footer>
    </div>
  );
}

function CardTile({ card, onClick, hideOnError, onError, priceData }) {
  const [errored, setErrored] = useState(false);
  // PTCG-database images are full URLs ending in .jpg/.png; TCGdex are base URLs needing /low.webp suffix
  const lowImg  = card._fullUrl ? card.image : `${card.image}/low.webp`;
  const highImg = card._fullUrl ? card.image : `${card.image}/high.webp`;
  if (errored && hideOnError) return null;
  // Resolve set + release date for the user-facing line under the card name.
  // Fallback to deriving setId from card.id (TCGdex list endpoint omits set object).
  const sid = card.set?.id || (typeof card.id === 'string' && card.id.includes('-') ? card.id.split('-')[0] : null);
  const meta = card._tileLang === 'ja'    ? JP_SET_INFO[sid]
            : card._tileLang === 'zh-tw' ? TC_SET_INFO[sid]
            : { name: card.set?.name, date: EN_SET_DATES[sid] };
  const setName = meta?.name || sid;
  const date = meta?.date;
  return (
    <button onClick={onClick}
      className="holo text-left bg-zinc-950 rounded-md overflow-hidden border border-zinc-900 hover:border-[#FFCC00]/40 hover:-translate-y-0.5 transition fadein relative">
      {card._tileLang && (
        <div className="absolute top-1.5 right-1.5 z-10 mono text-[8px] font-bold px-1.5 py-0.5 rounded-sm bg-black/80 backdrop-blur-sm text-[#FFCC00] border border-zinc-700/50 uppercase" style={{letterSpacing:'0.1em'}}>
          {card._tileLang}
        </div>
      )}
      <div className="aspect-[245/337] relative bg-zinc-900">
        {!errored ? (
          <img src={lowImg} srcSet={`${lowImg} 1x, ${highImg} 2x`} alt={card.name} loading="lazy"
            onError={() => { setErrored(true); onError && onError(); }} className="w-full h-full object-contain" />
        ) : (
          <div className="w-full h-full flex items-center justify-center text-zinc-700"><IOff className="w-6 h-6" /></div>
        )}
      </div>
      <div className="px-2.5 py-2 border-t border-zinc-900 flex items-start gap-2">
        <div className="flex-1 min-w-0">
          <div className="text-xs font-bold truncate text-zinc-100">{card.name}</div>
          <div className="mono text-[9px] text-zinc-500 mt-0.5 truncate" style={{letterSpacing:'0.05em'}}>
            {date || setName || '—'}
          </div>
        </div>
        {priceData && (
          <div className="text-right shrink-0 mono">
            <div className="text-[10px] text-[#FFCC00] font-bold tabular-nums">
              {priceData.raw?.avgRecent ? `¥${priceData.raw.avgRecent.toLocaleString()}` : <span className="text-zinc-700">—</span>}
            </div>
            <div className="text-[9px] text-zinc-400 tabular-nums mt-0.5">
              {priceData.psa10?.avgRecent ? `PSA10 ¥${priceData.psa10.avgRecent.toLocaleString()}` : <span className="text-zinc-700">PSA10 —</span>}
            </div>
          </div>
        )}
      </div>
    </button>
  );
}

function CardModal({ card, currentLang, onClose }) {
  // Open modal in the language of the clicked tile (if it's a ALL-mode variant),
  // otherwise the user's selected display language, defaulting to EN for ALL.
  const initialLang = card._tileLang || (currentLang === 'all' ? 'en' : currentLang);
  const [activeLang, setActiveLang] = useState(initialLang);
  // For PTCG-database (full URL, no language thumbnails): use image directly.
  // For TCGdex: build /high.png URL by swapping language.
  const activeImage = card._fullUrl ? card.image : swapLang(card.image, activeLang);
  const highImg = card._fullUrl ? card.image : `${activeImage}/high.png`;

  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', onKey);
    document.body.style.overflow = 'hidden';
    return () => {
      window.removeEventListener('keydown', onKey);
      document.body.style.overflow = '';
    };
  }, [onClose]);

  return (
    <div className="fixed inset-0 bg-black/95 backdrop-blur-sm z-50 overflow-y-auto fadein" onClick={onClose}>
      <button onClick={onClose}
        className="fixed top-3 right-3 md:top-4 md:right-4 w-10 h-10 rounded-full bg-zinc-900 border border-zinc-700 hover:border-white hover:bg-zinc-800 flex items-center justify-center transition z-10">
        <IX className="w-5 h-5" />
      </button>
      <div className="min-h-screen flex items-start md:items-center justify-center p-4 md:p-8" onClick={(e) => e.stopPropagation()}>
        <div className="max-w-5xl w-full grid md:grid-cols-[auto_1fr] gap-6 md:gap-10 items-start py-12 md:py-0">
          <div className="mx-auto">
            <img key={activeImage} src={highImg} alt={card.name}
              className="max-h-[70vh] md:max-h-[80vh] w-auto rounded-2xl shadow-2xl fadein"
              style={{ filter: 'drop-shadow(0 25px 60px rgba(255,204,0,0.18))' }}
              onError={(e) => { e.currentTarget.style.opacity = '0.3'; }} />
          </div>
          <div className="text-zinc-200 max-w-md">
            <div className="mono text-[10px] text-zinc-500 uppercase mb-2 flex items-center gap-2" style={{letterSpacing:'0.2em'}}>
              <span className="px-1.5 py-0.5 bg-[#FFCC00] text-black font-bold rounded-sm">{activeLang.toUpperCase()}</span>
            </div>
            <h2 className="display text-3xl md:text-5xl mb-1 text-white">{card.name}</h2>
            <p className="mono text-xs text-zinc-500 uppercase mb-3" style={{letterSpacing:'0.15em'}}>local id · {card.localId}</p>
            {(() => {
              const sid = card.set?.id || (typeof card.id === 'string' && card.id.includes('-') ? card.id.split('-')[0] : null);
              const meta = card._tileLang === 'ja'    ? JP_SET_INFO[sid]
                        : card._tileLang === 'zh-tw' ? TC_SET_INFO[sid]
                        : { name: card.set?.name, date: EN_SET_DATES[sid] };
              const setName = meta?.name || sid || '—';
              const date = meta?.date;
              return (
                <div className="mb-6 border-l-2 border-[#FFCC00]/40 pl-3 text-xs text-zinc-400 space-y-1">
                  <div><span className="mono text-[10px] uppercase text-zinc-600 mr-2" style={{letterSpacing:'0.15em'}}>SET</span>{setName}{sid && setName !== sid && <span className="text-zinc-700 ml-2 mono text-[10px]">({sid})</span>}</div>
                  <div><span className="mono text-[10px] uppercase text-zinc-600 mr-2" style={{letterSpacing:'0.15em'}}>RELEASED</span>{date || <span className="text-zinc-700">—</span>}</div>
                </div>
              );
            })()}

            {!card._fullUrl && (
              <div className="mb-6">
                <div className="mono text-[10px] text-zinc-500 uppercase mb-2 flex items-center gap-1.5" style={{letterSpacing:'0.15em'}}>
                  <ILayers className="w-3 h-3" /> view in other languages
                </div>
                <div className="grid grid-cols-5 gap-1.5">
                  {LANGUAGES.filter(l => l.code !== 'all').map(l => (
                    <LangThumb key={l.code} lang={l} imageUrl={swapLang(card.image, l.code)}
                      active={activeLang === l.code} onClick={() => setActiveLang(l.code)} />
                  ))}
                </div>
                <p className="mono text-[10px] text-zinc-600 mt-2">Faded thumbs = card not released in that language</p>
              </div>
            )}

            <div className="mb-6">
              <div className="mono text-[10px] text-zinc-500 uppercase mb-2" style={{letterSpacing:'0.15em'}}>Direct image URLs</div>
              <div className="flex gap-1.5 flex-wrap">
                {card._fullUrl ? (
                  <UrlPill href={activeImage} label="image" sub="full" />
                ) : (
                  <>
                    <UrlPill href={`${activeImage}/high.webp`} label="high·webp" sub="600×825" />
                    <UrlPill href={`${activeImage}/high.png`}  label="high·png"  sub="600×825" />
                    <UrlPill href={`${activeImage}/low.webp`}  label="low·webp"  sub="245×337" />
                  </>
                )}
              </div>
            </div>

            <div className="mono text-[10px] text-zinc-600 leading-relaxed border-t border-zinc-900 pt-3">
              <code className="break-all text-zinc-500">{card._fullUrl ? activeImage : `${activeImage}/high.webp`}</code>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function LangThumb({ lang, imageUrl, active, onClick }) {
  const [errored, setErrored] = useState(false);
  return (
    <button onClick={onClick} title={lang.name}
      className={`relative aspect-[245/337] rounded-sm overflow-hidden border-2 transition ${
        active ? 'border-[#FFCC00]' : 'border-zinc-900 hover:border-zinc-600'
      }`}>
      {!errored ? (
        <img src={`${imageUrl}/low.webp`} alt={lang.name} loading="lazy"
          onError={() => setErrored(true)}
          className={`w-full h-full object-cover transition ${active ? '' : 'opacity-70'}`} />
      ) : (
        <div className="w-full h-full bg-zinc-900 flex items-center justify-center opacity-30"><IOff className="w-3 h-3" /></div>
      )}
      <div className={`absolute bottom-0 inset-x-0 mono text-[8px] text-center py-0.5 font-bold ${
        active ? 'bg-[#FFCC00] text-black' : 'bg-black/70 text-zinc-400'
      }`}>{lang.label}</div>
    </button>
  );
}

function UrlPill({ href, label, sub }) {
  return (
    <a href={href} target="_blank" rel="noopener noreferrer"
      className="mono text-[10px] px-2.5 py-1.5 border border-zinc-800 hover:border-[#FFCC00] hover:text-[#FFCC00] rounded-sm transition flex flex-col items-start">
      <span className="font-bold">{label}</span>
      <span className="text-zinc-600 text-[9px]">{sub}</span>
    </a>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<MouseIndex />);
</script>
</body>
</html>
